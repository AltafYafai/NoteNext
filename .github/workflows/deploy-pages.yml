name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "app_logo.svg"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the root directory containing index.html
          path: '.'
          # Filter to only include index.html and app_logo.svg to keep artifact small
          # Actually upload-pages-artifact uploads the whole path. 
          # To be precise, we could move them to a 'public' folder, but keeping it simple for now.
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
