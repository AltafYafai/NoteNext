name: Manual Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.4.0

    - name: Extract Version Info
      id: version_info
      run: |
        VERSION_NAME=$(grep "appVersionName=" gradle.properties | cut -d'=' -f2)
        VERSION_CODE=$(grep "appVersionCode=" gradle.properties | cut -d'=' -f2)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Generate Professional Release Notes
      id: release_notes
      shell: python
      run: |
        import json
        import os

        version = os.environ.get('VERSION_NAME')
        build_code = os.environ.get('VERSION_CODE')
        repo = os.environ.get('GITHUB_REPOSITORY')
        
        try:
            with open('changelog.json', 'r') as f:
                data = json.load(f)
            
            release = next((r for r in data['releases'] if r['version'] == version), None)
            
            if release:
                # GitHub Body
                body = f"## Release v{version} ({release['date']})\n\n"
                
                # --- Telegram Premium Message (TechToli Style) ---
                tg_body = f"🚀 *NoteNext v{version} | Professional Release* 📝\n\n"
                tg_body += f"*Experience the next generation of private, AI-powered note-taking.*\n\n"
                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
                tg_body += "✨ *WHAT'S NEW IN THIS VERSION?*\n"
                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n"

                # Group by type
                features = [item for item in release['items'] if item['type'] == 'FEATURE']
                improvements = [item for item in release['items'] if item['type'] == 'IMPROVEMENT']
                fixes = [item for item in release['items'] if item['type'] == 'FIX']
                
                if features:
                    body += "### New Features\n"
                    tg_body += "🌟 *NEW FEATURES*\n"
                    for item in features:
                        body += f"- **{item['title']}**: {item['description']}\n"
                        tg_body += f"• *{item['title']}*: {item['description']}\n"
                    body += "\n"
                    tg_body += "\n"
                
                if improvements:
                    body += "### Improvements\n"
                    tg_body += "🚀 *SYSTEM IMPROVEMENTS*\n"
                    for item in improvements:
                        body += f"- **{item['title']}**: {item['description']}\n"
                        tg_body += f"• *{item['title']}*: {item['description']}\n"
                    body += "\n"
                    tg_body += "\n"
                    
                if fixes:
                    body += "### Bug Fixes\n"
                    tg_body += "🐛 *CRITICAL BUG FIXES*\n"
                    for item in fixes:
                        body += f"- **{item['title']}**: {item['description']}\n"
                        tg_body += f"• *{item['title']}*: {item['description']}\n"
                    body += "\n"
                    tg_body += "\n"
                
                body += "---\n"
                body += "### Developer Information\n"
                body += "- **Lead Developer**: Suvojeet Sengupta\n"
                body += "- **GitHub**: [@suvojeet-sengupta](https://github.com/suvojeet-sengupta)\n"
                body += f"- **Build Version**: {build_code}\n\n"
                body += "### Links\n"
                body += f"- [Download Full Changelog](https://raw.githubusercontent.com/{repo}/main/changelog.json)\n"
                body += f"- [Project Repository](https://github.com/{repo})\n"
                
                # Add Technical Info to Telegram
                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
                tg_body += "📊 *TECHNICAL INFO*\n"
                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
                tg_body += f"📦 *Package:* `com.suvojeet.notenext`\n"
                tg_body += f"🏷️ *Version:* `{version}`\n"
                tg_body += f"🏗️ *Build:* `{build_code}`\n"
                tg_body += "📱 *Min SDK:* `26 (Android 8.0)`\n"
                tg_body += "⚖️ *License:* `MIT (Open Source)`\n\n"

                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
                tg_body += "📥 *DOWNLOAD & LINKS*\n"
                tg_body += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
                tg_body += f"🚀 *Play Store:* [Download Now](https://play.google.com/store/apps/details?id=com.suvojeet.notenext)\n"
                tg_body += f"☕ *Support:* [Coindrop](https://coindrop.to/suvojeet_sengupta)\n"
                tg_body += f"⭐ *GitHub:* [AltafYafai/NoteNext](https://github.com/{repo})\n"
                tg_body += f"💬 *Support:* @NoteNextCommunity\n\n"
                tg_body += "#NoteNext #Android #Material3 #Privacy #AI #OpenSource"

                with open('release_body.md', 'w') as f:
                    f.write(body)
                with open('tg_body.txt', 'w') as f:
                    f.write(tg_body)
            else:
                with open('release_body.md', 'w') as f:
                    f.write(f"Automated release for version {version}")
                with open('tg_body.txt', 'w') as f:
                    f.write(f"🚀 NoteNext v{version} Released!")
        except Exception as e:
            error_msg = f"Automated release for version {version}\n\nError parsing changelog: {str(e)}"
            with open('release_body.md', 'w') as f:
                f.write(error_msg)
            with open('tg_body.txt', 'w') as f:
                f.write(error_msg)

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.keystore

    - name: Build and Sign Release (APK & AAB)
      run: gradle assembleRelease bundleRelease --parallel --no-daemon
      env:
        KEYSTORE_PATH: "my-release-key.keystore"
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GROQ_API_1: ${{ secrets.GROQ_API_1 }}

    - name: Determine Artifact Paths
      id: paths
      run: |
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        AAB_FILE=$(find app/build/outputs/bundle/release -name "*.aab" | head -n 1)
        echo "APK_PATH=$APK_FILE" >> $GITHUB_ENV
        echo "AAB_PATH=$AAB_FILE" >> $GITHUB_ENV

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: Release v${{ env.VERSION_NAME }}
        body_path: release_body.md
        draft: false
        prerelease: false
        files: |
          ${{ env.APK_PATH }}
          ${{ env.AAB_PATH }}
        overwrite: true

    - name: Send Release to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message_file: tg_body.txt
        document: ${{ env.APK_PATH }}
